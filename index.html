<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Scrollytelling</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <h1>Aura Precision</h1>
        <p class="subtitle">Experience the future of maxillofacial diagnostics</p>
    </header>
    
    <div class="scroll-container">
        <div class="hero-section">
            <canvas id="hero-canvas"></canvas>
        </div>
    </div>

    <!-- Adding some extra space at the bottom to allow scrolling past the hero section -->
    <div style="height: 100vh; display: flex; align-items: center; justify-content: center; background: #111;">
        <h2>End of Scrollytelling Section</h2>
    </div>

    <script src="script.js"></script>
</body>
</html>
